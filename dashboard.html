<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Regent | Agent Awareness Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0e14; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 40px; }
        h1 { font-family: 'Rajdhani', sans-serif; color: #00C9B7; text-transform: uppercase; letter-spacing: 2px; border-left: 4px solid #00C9B7; padding-left: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(0,201,183,0.2); padding: 25px; border-radius: 12px; backdrop-filter: blur(10px); }
        .big-num { font-size: 56px; font-weight: bold; color: #00C9B7; margin: 10px 0; }
        .label { color: rgba(255,255,255,0.5); text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: rgba(255,255,255,0.4); font-size: 11px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-transform: uppercase; }
        td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; font-family: monospace; }
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; display: inline-block; min-width: 80px; text-align: center; }
        .tag-human { background: rgba(0, 201, 183, 0.1); color: #00C9B7; border: 1px solid #00C9B7; }
        .tag-agent { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid #ff4757; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1000px; margin: 0 auto;">
        <h1>Regent Protocol <span style="font-weight: 200; opacity: 0.6;">// Awareness</span></h1>
        <div class="grid">
            <div class="card">
                <div class="label">Total Humans Identified</div>
                <div id="count-human" class="big-num">0</div>
            </div>
            <div class="card">
                <div class="label">Autonomous Agents Detected</div>
                <div id="count-agent" class="big-num" style="color: #ff4757;">0</div>
            </div>
        </div>
        <div class="card" style="margin-top: 20px;">
            <div class="label">Real-time Entity Stream</div>
            <table id="log-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Entity Type</th>
                        <th>Risk Score</th>
                        <th>Detection Reason</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        async function updateStats() {
            try {
                // Сброс кэша через временную метку
                const res = await fetch('/api/stats?nocache=' + Date.now());
                const data = await res.json();
                
                // 1. Обновляем счетчики напрямую из базы
                document.getElementById('count-human').innerText = data.human || 0;
                document.getElementById('count-agent').innerText = data.agent || 0;
                
                const tbody = document.querySelector('#log-table tbody');
                
                if (data.recent && data.recent.length > 0) {
                    tbody.innerHTML = data.recent.map(item => {
                        // Парсим данные, если они пришли в виде строки JSON
                        const r = typeof item === 'string' ? JSON.parse(item) : item;
                        
                        // Определяем, человек это или бот
                        const type = (r.entity_type || r.type || '').toLowerCase();
                        const risk = r.risk !== undefined ? r.risk : (r.score || 0);
                        const reason = (r.reason || '').toLowerCase();
                        
                        // Критерии человечности
                        const isHuman = (type === 'human' || risk === 0 || reason.includes('human'));

                        return `
                            <tr>
                                <td style="color: rgba(255,255,255,0.6)">${r.time || 'JUST NOW'}</td>
                                <td>
                                    <span class="tag ${isHuman ? 'tag-human' : 'tag-agent'}">
                                        ${isHuman ? '👤 HUMAN' : '🤖 AGENT'}
                                    </span>
                                </td>
                                <td style="color: ${isHuman ? '#00C9B7' : '#ff4757'}; font-weight: bold;">
                                    ${risk}%
                                </td>
                                <td style="color: rgba(255,255,255,0.4); font-size: 12px;">
                                    ${r.reason || 'Verified'}
                                </td>
                            </tr>
                        `;
                    }).join('');
                }
            } catch (e) {
                console.error("Regent Sync Error:", e);
            }
        }

        // Обновляем раз в 2 секунды для динамики
        setInterval(updateStats, 2000);
        updateStats();
    </script>
</body>
</html>
